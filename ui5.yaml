specVersion: "4.0"
metadata:
  name: zlbpwa.zlbpwa_sortedwchrep2
type: application
server:
  customMiddleware:
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertErrors: false
        backend:
          - path: /sap
            url: http://wf2.lag.at:443
            scp: true
            destination: WF2
        ui5:
          path:
            - /resources
            - /test-resources
          url: https://ui5.sap.com
          version: 1.70.1
    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp
        delay: 300
    - name: fiori-tools-preview
      afterMiddleware: fiori-tools-appreload
      configuration:
        component: zlbpwa.zlbpwa_sortedwchrep2
        ui5Theme: sap_fiori_3
