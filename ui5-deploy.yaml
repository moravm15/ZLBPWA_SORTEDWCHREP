# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: zlbpwa.zlbpwa_sortedwchrep2
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          destination: WF2
          url: http://wf2.lag.at:443
          scp: true
        app:
          name: ZLBPWA_SORTWCH
          description: ZLBPWA_SORTWCH
          package: ZLBPWA_AC
          transport: WF2K901814
        exclude:
          - /test/
